trigger:
  branches:
    include:
      - main
      - develop
      - release-*
      - refs/tags/*
  paths:
    exclude:
      - .gitignore
      - .clang-format
      - .github/*
      - LICENSE.md
      - README.md

# PR always trigger build
pr:
  autoCancel: true

# scheduled build
schedules:
- cron: "50 23 * * *"
  branches:
    include: [ main ]
  always: true
  displayName: Daily build at 23:50

resources:
  repositories:
    - repository: templates
      type: github
      name: nanoframework/nf-tools
      endpoint: nanoframework
    - repository: templatesBuild
      type: github
      name: nanoframework/nf-interpreter
      ref: refs/heads/main
      endpoint: nanoframework
    - repository: esp32_idf
      type: github
      name: espressif/esp-idf
      endpoint: nanoframework
      ref: refs/tags/v5.5.4

stages:

##############################
- stage: Check_Build_Options
  jobs:
  - job: Check_Build_Options
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self
      fetchDepth: 1

    - template: azure-pipelines-templates/get-commit-details.yml@templates

    - powershell: |

        # compute authorization header in format "AUTHORIZATION: basic 'encoded token'"
        # 'encoded token' is the Base64 of the string "nfbot:personal-token"
        $auth = "basic $([System.Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes("nfbot:$(GitHubToken)")))"

        # use AZDO macro expansion for these so env var casing is never an issue on Linux
        $pullRequestNumber = "$(System.PullRequest.PullRequestNumber)"
        $repositoryName = "$(Build.Repository.Name)"

        if($env:SYSTEM_PULLREQUEST_PULLREQUESTID -ne $null)
        {
          # this is a PR: always build depending on target tag
          echo "##vso[task.setvariable variable=GO;isOutput=true]false"

          "**PR build**" | Write-Host

          # get PR body to check for build target tags
          try
          {
            $prUrl = "https://api.github.com/repos/$repositoryName/pulls/$pullRequestNumber"

            $pr = Invoke-RestMethod -Uri $prUrl -ContentType "application/json" -Headers @{Accept = "application/json"; Authorization = "$auth"} -Method GET

            if($pr -ne $null)
            {
              $prBody = $pr.body.Replace("`r`n", " ").Replace("`r", " ").Replace("`n", " ")

              "Flattened PR body: '$prBody'" | Write-Host

              echo "##vso[task.setvariable variable=COMMIT_MESSAGE_FROMPR;isOutput=true]$prBody"
            }
          }
          catch
          {
            Write-Warning "GitHub API call to retrieve PR body failed: $_"
          }
        }
        else
        {
          # build NOT from PR
          Write-Host "Build for commit ID: $(Build.SourceVersion)"

          # default build flag to FALSE, so other options are checked for what to build
          echo "##vso[task.setvariable variable=GO;isOutput=true]false"

          if($env:BUILD_ALL -like "True")
          {
            # this has BUILD ALL build var set to true
            "**Build ALL**" | Write-Host
          }
          else
          {
            if("$(Build.Reason)" -eq "Schedule")
            {
              # scheduled daily build: check commits for the scheduled day (UTC)
              "**Scheduled build**" | Write-Host

              try {
                $queuedDateUtc = [System.DateTimeOffset]::Parse("$(Build.QueuedDate)").UtcDateTime
              } catch {
                # fallback, should not happen
                $queuedDateUtc = [System.DateTime]::UtcNow
              }
              "Scheduled (queued) datetime (UTC): $queuedDateUtc" | Write-Host

              # get commit datetime for this repo (ISO 8601 from git)
              $thisRepoLastCommitDateStr = git show -s --format=%cd --date=iso-strict
              $thisRepoLastCommitDate = [System.DateTimeOffset]::Parse($thisRepoLastCommitDateStr).UtcDateTime
              "Last commit for this repo dated $thisRepoLastCommitDate" | Write-Host

              # clone nf-interpreter
              git clone https://github.com/nanoframework/nf-interpreter.git -b main nf-interpreter --depth 1 -q
              cd "nf-interpreter" > $null

              # get commit datetime for nf-interpreter
              $interpreterLastCommitDateStr = git show -s --format=%cd --date=iso-strict
              $interpreterLastCommitDate = [System.DateTimeOffset]::Parse($interpreterLastCommitDateStr).UtcDateTime
              "Last commit for nf-interpreter dated $interpreterLastCommitDate" | Write-Host

              if(($interpreterLastCommitDate -ge $queuedDateUtc.AddDays(-1)) -or ($thisRepoLastCommitDate -ge $queuedDateUtc.AddDays(-1)))
              {
                # last commit is within the past 24 hours, build ALL images
                echo "##vso[task.setvariable variable=GO;isOutput=true]true"

                "**Update upstream: Build ALL**" | Write-Host
              }
              else
              {
                # no commits for the scheduled day, skip build

                "***************************************************" | Write-Host
                "* No commits for scheduled day, skipping build    *" | Write-Host
                "***************************************************" | Write-Host

                echo "##vso[task.setvariable variable=GO;isOutput=true]false"
              }
            }
            elseif("$(Build.Reason)" -eq "IndividualCI")
            {
                "**Build for a push (commit)**" | Write-Host

                # need to wrap this in a try/catch because PR doesn't always exist
                try
                {
                    # get PR associated with commit
                    $prUrl = "https://api.github.com/repos/$repositoryName/commits/$(Build.SourceVersion)/pulls"

                    $commit = Invoke-RestMethod -Uri $prUrl -ContentType "application/json" -Headers @{Accept = "application/vnd.github.groot-preview+json"; Authorization = "$auth"}  -Method GET

                    if($commit -ne $null)
                    {
                      # get PR body to check for build target tags
                      $commitMessageFromPR = $commit[0].body

                      # need to flatten message by removing new lines
                      $commitMessageFromPR = $commitMessageFromPR.Replace("`r`n", " ").Replace("`r", " ").Replace("`n", " ")

                      "Flattened PR body from associated PR is: '$commitMessageFromPR'" | Write-Host

                      # set variable to forward to jobs
                      echo "##vso[task.setvariable variable=COMMIT_MESSAGE_FROMPR;isOutput=true]$commitMessageFromPR"
                    }
                }
                catch
                {
                    $httpStatus = if ($_.Exception.Response) { $_.Exception.Response.StatusCode.value__ } else { $null }
                    if ($null -eq $httpStatus -or $httpStatus -ne 404) {
                        Write-Warning "GitHub API call to retrieve PR associated with commit failed: $_"
                    }
                }
            }
            else
            {
              # build for other reasons: build depending on target tag
              echo "##vso[task.setvariable variable=GO;isOutput=true]false"

              "**Build for other reasons**" | Write-Host
            }
          }
        }

      name: BuildOptions
      displayName: Evaluate build options

##############################
- stage: Check_Code_Style
  dependsOn: Check_Build_Options
  condition: succeeded()
  jobs:
  - job: Check_Code_Style
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self
      fetchDepth: 1

    - template: azure-pipelines-templates/download-install-llvm.yml@templatesBuild
    - template: azure-pipelines-templates/check-code-style.yml@templatesBuild

##############################
- stage: Build
  dependsOn:
    - Check_Code_Style
    - Check_Build_Options
  jobs:

  # STM32 targets
  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: MBN_QUAIL
      targetSeries: stm32f4xx
      needsDFU: true

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: NESHTEC_NESHNODE_V1
      targetSeries: stm32f7xx
      needsDFU: true

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: BrainPad2
      targetSeries: stm32f4xx
      needsDFU: true

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: GHI_FEZ_CERB40_NF
      targetSeries: stm32f4xx
      needsDFU: true

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: GHI_FEZ_CERBERUS_NF
      targetSeries: stm32f4xx

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: I2M_ELECTRON_NF
      targetSeries: stm32f4xx
      needsDFU: true

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: I2M_OXYGEN_NF
      targetSeries: stm32f4xx
      needsDFU: true

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: WEACT_F411CE
      targetSeries: stm32f4xx
      needsDFU: true

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: ST_NUCLEO64_F401RE_NF
      targetSeries: stm32f4xx
      needsDFU: true

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: ST_NUCLEO64_F411RE_NF
      targetSeries: stm32f4xx

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: ST_STM32F411_DISCOVERY
      targetSeries: stm32f4xx

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: ST_NUCLEO144_F412ZG_NF
      targetSeries: stm32f4xx

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: ST_NUCLEO144_F746ZG
      targetSeries: stm32f7xx
      needsDFU: true

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: ST_NUCLEO144_F767ZI
      targetSeries: stm32f7xx
      needsDFU: true

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: ST_STM32F4_DISCOVERY
      targetSeries: stm32f4xx

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: ST_NUCLEO144_F439ZI
      targetSeries: stm32f4xx

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: PybStick2x
      targetSeries: stm32f4xx
      needsDFU: true

  - template: azure-pipelines-templates/build-stm32-job.yml
    parameters:
      targetBoard: NETDUINO3_WIFI
      targetSeries: stm32f4xx
      needsDFU: true

  # TI SimpleLink targets
  - template: azure-pipelines-templates/build-ti-simplelink-job.yml
    parameters:
      targetBoard: TI_CC1352P1_LAUNCHXL
      packageName: TI_CC1352P1_LAUNCHXL_868
      targetSeries: CC13X2
      buildOptions: '-DTI_SIMPLELINK_RADIO_FREQ_MHZ=868'

  - template: azure-pipelines-templates/build-ti-simplelink-job.yml
    parameters:
      targetBoard: TI_CC1352P1_LAUNCHXL
      packageName: TI_CC1352P1_LAUNCHXL_915
      targetSeries: CC13X2
      buildOptions: '-DTI_SIMPLELINK_RADIO_FREQ_MHZ=915'

  # ESP32 targets
  - template: azure-pipelines-templates/build-esp32-job.yml
    parameters:
      targetName: LilygoTWatch2020
      idfTarget: esp32

  - template: azure-pipelines-templates/build-esp32-job.yml
    parameters:
      targetName: LilygoTWatch2021
      idfTarget: esp32

##################################
# report build failure to Discord
- stage: Report_Build_Failure
  dependsOn:
    - Check_Build_Options
    - Check_Code_Style
    - Build
  condition: |
    or(
      failed('Check_Build_Options'),
      failed('Check_Code_Style'),
      failed('Build')
    )
  jobs:
  - job: Report_Build_Failure
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self
      fetchDepth: 1

    # step from template @ nf-tools repo
    - template: azure-pipelines-templates/discord-webhook.yml@templates
      parameters:
        status: 'failure'
        webhookUrl: '$(DiscordWebhook)'
        message: ''
